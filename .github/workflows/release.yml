name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check if package version matches tag
        if: github.event_name != 'workflow_dispatch'
        run: |
          VERSION="$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "factbook") | .version')"
          if ! [[ "v$VERSION" == "${{ github.ref_name }}" ]]; then
            echo "Mismatched package version and tag name!"
            echo "version: v$VERSION"
            echo "tag:     ${{ github.ref_name }}"
            exit 1
          fi

  build:
    needs: check-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64
            platform: ubuntu-latest
            setup: ./setup.sh
            config: src-tauri/tauri.linux.release.conf.json

          - name: MacOS x86-64
            platform: macos-26-intel
            setup: ./setup.sh
            config: src-tauri/tauri.macos.release.conf.json

          - name: MacOS arm64
            platform: macos-26
            setup: ./setup.sh
            config: src-tauri/tauri.macos.release.conf.json

          - name: Windows x86-64
            platform: windows-latest
            setup: .\setup.ps1
            config: src-tauri/tauri.windows.release.conf.json

    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ${{ matrix.setup }}
      - if: matrix.platform == 'windows-latest'
        run: echo "SWIPL=$GITHUB_WORKSPACE/libs/swipl/bin/swipl.exe" >> "$GITHUB_ENV"
        shell: bash

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
          run_install: true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --config ${{ matrix.config }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && 'release-test' || 'v__VERSION__' }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && 'release-test' || 'v__VERSION__' }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' }}
          generateReleaseNotes: true
