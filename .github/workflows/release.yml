name: Release

on:
  push:
    # tags:
    #   - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64
            platform: ubuntu-latest
            setup: SHARED_LIBS_TARGET=x86_64-unknown-linux-gnu ./setup.sh

          - name: MacOS x86-64
            platform: macos-26-intel
            setup: SHARED_LIBS_TARGET=x86_64-apple-darwin ./setup.sh
            build-args: "--target x86_64-apple-darwin"

          - name: MacOS arm64
            platform: macos-26
            setup: SHARED_LIBS_TARGET=aarch64-apple-darwin ./setup.sh
            build-args: "--target aarch64-apple-darwin"

          - name: Windows x86-64
            platform: windows-latest
            setup: .\setup.ps1

    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ${{ matrix.setup }}
      - if: matrix.platform == 'windows-latest'
        run: echo "SWIPL=$GITHUB_WORKSPACE/libs/swipl/bin/swipl.exe" >> "$GITHUB_ENV"
        shell: bash

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
          run_install: true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseDraft: true
          args: ${{ matrix.build-args }}
