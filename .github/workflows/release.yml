name: Release

on:
  push:
    # tags:
    #   - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64
            platform: ubuntu-latest
            setup: ENV_OUTPUT="$GITHUB_ENV" TARGET=x86_64-unknown-linux-gnu ./setup.sh

          - name: MacOS x86-64
            platform: macos-latest
            setup: ENV_OUTPUT="$GITHUB_ENV" TARGET=x86_64-apple-darwin ./setup.sh
            build-args: '--target x86_64-apple-darwin'

          - name: MacOS aarch64
            platform: macos-latest
            setup: ENV_OUTPUT="$GITHUB_ENV" TARGET=aarch64-apple-darwin ./setup.sh
            build-args: '--target aarch64-apple-darwin'

          - name: Windows x86-64
            platform: windows-latest
            setup: .\setup.ps1

    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ${{ matrix.setup }}

      - run: swipl -g 'write(hello),nl,halt.'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
          run_install: true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SWIPL: ${{ matrix.platform == 'windows-latest' && format('{0}/libs/swipl/bin/swipl.exe', github.workspace) || '' }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseDraft: true
          args: ${{ matrix.build-args }}
